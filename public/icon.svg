<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- base -->
  <rect x="20" y="75" width="80" height="10" rx="3" stroke="url(#grad)" stroke-width="3"/>

  <!-- hojas -->
  <rect x="30" y="35" width="60" height="40" rx="5" stroke="url(#grad)" stroke-width="3"/>
  <rect x="25" y="40" width="60" height="40" rx="5" stroke="url(#grad)" stroke-width="3" opacity="0.7"/>
  <rect x="35" y="30" width="60" height="40" rx="5" stroke="url(#grad)" stroke-width="3" opacity="0.5"/>

  <!-- avatar -->
  <circle cx="60" cy="45" r="6" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- líneas texto -->
  <line x1="45" y1="60" x2="75" y2="60" stroke="url(#grad)" stroke-width="2"/>
  <line x1="45" y1="66" x2="70" y2="66" stroke="url(#grad)" stroke-width="2"/>

  <!-- gradiente -->
  <defs>
    <linearGradient id="grad" x1="20" y1="30" x2="100" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/> <!-- azul -->
      <stop offset="1" stop-color="#A855F7"/> <!-- violeta -->
    </linearGradient>
  </defs>
</svg>